<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" role="img" aria-label="Diagrama didatico da arquitetura U-Net">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#a855f7"/>
    </marker>
    <linearGradient id="enc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="dec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="bot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>

  <rect width="820" height="420" fill="#0d0f14" rx="8"/>

  <text x="410" y="30" text-anchor="middle" fill="#f8fafc" font-family="Inter,Segoe UI,sans-serif" font-size="16" font-weight="700">U-Net &#8212; encoder &#183; bottleneck &#183; decoder</text>
  <text x="410" y="50" text-anchor="middle" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="11">Diagrama did&#225;tico inspirado em Ronneberger et al. (2015)</text>

  <g id="encoder">
    <rect x="40" y="70" width="120" height="280" fill="url(#enc)" rx="6" opacity="0.9"/>
    <text x="100" y="95" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">572&#215;572</text>

    <rect x="90" y="110" width="100" height="220" fill="url(#enc)" rx="6" opacity="0.85"/>
    <text x="140" y="130" text-anchor="middle" fill="#fff" font-size="10">284&#215;284</text>

    <rect x="130" y="145" width="80" height="170" fill="url(#enc)" rx="6" opacity="0.8"/>
    <text x="170" y="163" text-anchor="middle" fill="#fff" font-size="10">140&#215;140</text>

    <rect x="165" y="175" width="65" height="130" fill="url(#enc)" rx="6" opacity="0.75"/>
    <text x="197" y="192" text-anchor="middle" fill="#fff" font-size="9">68&#215;68</text>

    <rect x="195" y="200" width="50" height="95" fill="url(#enc)" rx="6" opacity="0.7"/>
    <text x="220" y="216" text-anchor="middle" fill="#fff" font-size="9">32&#215;32</text>
  </g>

  <rect x="230" y="225" width="40" height="50" fill="url(#bot)" rx="6"/>
  <text x="250" y="255" text-anchor="middle" fill="#fff" font-size="8">16&#215;16</text>
  <text x="250" y="295" text-anchor="middle" fill="#f97316" font-size="11" font-weight="600">Bottleneck</text>

  <g id="decoder">
    <rect x="255" y="200" width="50" height="95" fill="url(#dec)" rx="6" opacity="0.7"/>
    <text x="280" y="216" text-anchor="middle" fill="#fff" font-size="9">32&#215;32</text>

    <rect x="290" y="175" width="65" height="130" fill="url(#dec)" rx="6" opacity="0.75"/>
    <text x="322" y="192" text-anchor="middle" fill="#fff" font-size="9">68&#215;68</text>

    <rect x="330" y="145" width="80" height="170" fill="url(#dec)" rx="6" opacity="0.8"/>
    <text x="370" y="163" text-anchor="middle" fill="#fff" font-size="10">140&#215;140</text>

    <rect x="375" y="110" width="100" height="220" fill="url(#dec)" rx="6" opacity="0.85"/>
    <text x="425" y="130" text-anchor="middle" fill="#fff" font-size="10">284&#215;284</text>

    <rect x="425" y="70" width="120" height="280" fill="url(#dec)" rx="6" opacity="0.9"/>
    <text x="485" y="95" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">572&#215;572</text>
  </g>

  <g stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.85">
    <path d="M 100 100 C 200 100, 200 120, 485 120"/>
    <path d="M 140 140 C 250 140, 250 160, 425 160"/>
    <path d="M 170 175 C 280 175, 280 195, 370 195"/>
    <path d="M 197 210 C 300 210, 300 230, 322 230"/>
    <path d="M 220 240 C 310 240, 310 250, 280 250"/>
  </g>

  <text x="100" y="370" text-anchor="middle" fill="#3b82f6" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="700">Encoder</text>
  <text x="100" y="388" text-anchor="middle" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="10">conv + max pool &#8594; resolu&#231;&#227;o &#8595;</text>

  <text x="485" y="370" text-anchor="middle" fill="#22c55e" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="700">Decoder</text>
  <text x="485" y="388" text-anchor="middle" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="10">upsample + conv &#8594; resolu&#231;&#227;o &#8593;</text>

  <text x="410" y="370" text-anchor="middle" fill="#a855f7" font-family="Inter,Segoe UI,sans-serif" font-size="12" font-weight="600">Skip connections</text>
  <text x="410" y="388" text-anchor="middle" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="10">concatena&#231;&#227;o de features de mesma escala</text>

  <rect x="555" y="140" width="90" height="70" fill="#1c2030" stroke="#38bdf8" stroke-width="1.5" rx="6"/>
  <text x="600" y="170" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="600">Entrada</text>
  <text x="600" y="188" text-anchor="middle" fill="#94a3b8" font-size="9">imagem RGB</text>

  <rect x="655" y="140" width="90" height="70" fill="#1c2030" stroke="#22c55e" stroke-width="1.5" rx="6"/>
  <text x="700" y="170" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">Sa&#237;da</text>
  <text x="700" y="188" text-anchor="middle" fill="#94a3b8" font-size="9">mapa de classes</text>

  <line x1="545" y1="175" x2="555" y2="175" stroke="#64748b" stroke-width="1.5"/>
  <line x1="745" y1="175" x2="755" y2="175" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="755,175 748,171 748,179" fill="#64748b"/>
</svg>
