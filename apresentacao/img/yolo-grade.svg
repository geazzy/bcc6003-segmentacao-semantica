<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" role="img" aria-label="Diagrama didático do YOLOv1: grade S×S e predições por célula">
  <defs>
    <linearGradient id="panel-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2030"/>
      <stop offset="100%" stop-color="#141720"/>
    </linearGradient>
    <pattern id="scene" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#1a2332"/>
      <circle cx="5" cy="6" r="2.5" fill="#334155" opacity="0.6"/>
      <rect x="10" y="10" width="4" height="4" fill="#334155" opacity="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="900" height="380" fill="#0d0f14" rx="8"/>

  <text x="450" y="28" text-anchor="middle" fill="#e2e8f0" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="700">YOLOv1 — grade e predições por célula</text>
  <text x="450" y="48" text-anchor="middle" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="11">Diagrama didático inspirado em Redmon et al. (2016)</text>

  <!-- Painel 1: Grade S×S -->
  <g id="panel-grade">
    <rect x="20" y="62" width="400" height="300" fill="url(#panel-bg)" stroke="#2a2f45" rx="10"/>
    <text x="220" y="88" text-anchor="middle" fill="#ef4444" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="700">Grade S × S</text>
    <text x="220" y="106" text-anchor="middle" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="10">Cada célula é responsável por objetos cujo centro cai nela</text>

    <rect x="80" y="118" width="280" height="280" fill="url(#scene)" stroke="#2a2f45" rx="4"/>

    <g stroke="#2a2f45" stroke-width="1">
      <line x1="120" y1="118" x2="120" y2="398"/>
      <line x1="160" y1="118" x2="160" y2="398"/>
      <line x1="200" y1="118" x2="200" y2="398"/>
      <line x1="240" y1="118" x2="240" y2="398"/>
      <line x1="280" y1="118" x2="280" y2="398"/>
      <line x1="320" y1="118" x2="320" y2="398"/>
      <line x1="80" y1="158" x2="360" y2="158"/>
      <line x1="80" y1="198" x2="360" y2="198"/>
      <line x1="80" y1="238" x2="360" y2="238"/>
      <line x1="80" y1="278" x2="360" y2="278"/>
      <line x1="80" y1="318" x2="360" y2="318"/>
      <line x1="80" y1="358" x2="360" y2="358"/>
    </g>

    <rect x="120" y="118" width="40" height="40" fill="#ef4444" opacity="0.18" stroke="#ef4444" stroke-width="2"/>
    <rect x="200" y="198" width="40" height="40" fill="#ef4444" opacity="0.18" stroke="#ef4444" stroke-width="2"/>
    <rect x="80" y="278" width="40" height="40" fill="#ef4444" opacity="0.18" stroke="#ef4444" stroke-width="2"/>

    <ellipse cx="140" cy="138" rx="14" ry="12" fill="#94a3b8" opacity="0.85"/>
    <rect x="126" y="124" width="28" height="26" fill="none" stroke="#ef4444" stroke-width="2" rx="2"/>
    <circle cx="140" cy="137" r="4" fill="#ef4444"/>
    <circle cx="140" cy="137" r="7" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>

    <ellipse cx="220" cy="218" rx="16" ry="13" fill="#64748b" opacity="0.9"/>
    <rect x="202" y="202" width="36" height="30" fill="none" stroke="#ef4444" stroke-width="2" rx="2"/>
    <circle cx="220" cy="217" r="4" fill="#ef4444"/>
    <circle cx="220" cy="217" r="7" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>

    <ellipse cx="100" cy="298" rx="11" ry="9" fill="#94a3b8" opacity="0.75"/>
    <rect x="88" y="288" width="24" height="20" fill="none" stroke="#ef4444" stroke-width="2" rx="2"/>
    <circle cx="100" cy="297" r="3.5" fill="#ef4444"/>
    <circle cx="100" cy="297" r="6" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>

    <circle cx="95" cy="348" r="4" fill="#ef4444"/>
    <text x="108" y="352" fill="#e2e8f0" font-family="Inter,Segoe UI,sans-serif" font-size="10">centro do objeto</text>
    <rect x="200" y="343" width="14" height="14" fill="#ef4444" opacity="0.18" stroke="#ef4444" stroke-width="1.5" rx="2"/>
    <text x="222" y="352" fill="#e2e8f0" font-family="Inter,Segoe UI,sans-serif" font-size="10">célula responsável</text>
  </g>

  <line x1="425" y1="210" x2="455" y2="210" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)" opacity="0.85"/>

  <g id="panel-predicoes">
    <rect x="460" y="62" width="420" height="300" fill="url(#panel-bg)" stroke="#2a2f45" rx="10"/>
    <text x="670" y="88" text-anchor="middle" fill="#ef4444" font-family="Inter,Segoe UI,sans-serif" font-size="14" font-weight="700">Predições por célula</text>
    <text x="670" y="106" text-anchor="middle" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="10">A rede regressa, para cada célula, caixas, presença e classes</text>

    <g transform="translate(490, 125)">
      <rect width="90" height="90" fill="#1a2332" stroke="#ef4444" stroke-width="2" rx="4"/>
      <ellipse cx="45" cy="42" rx="18" ry="15" fill="#64748b" opacity="0.8"/>
      <rect x="28" y="28" width="34" height="28" fill="none" stroke="#ef4444" stroke-width="1.5" rx="2"/>
      <circle cx="45" cy="41" r="3" fill="#ef4444"/>
      <text x="45" y="108" text-anchor="middle" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="9">célula ampliada</text>
    </g>

    <g transform="translate(610, 125)">
      <rect width="240" height="72" fill="#0d0f14" stroke="#2a2f45" rx="6"/>
      <text x="12" y="20" fill="#e2e8f0" font-family="Inter,Segoe UI,sans-serif" font-size="11" font-weight="600">1. Coordenadas da bounding box</text>
      <text x="12" y="38" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="10">(x, y, w, h) relativas à célula</text>
      <rect x="150" y="22" width="78" height="42" fill="#1a2332" stroke="#2a2f45" rx="3"/>
      <rect x="168" y="32" width="42" height="24" fill="none" stroke="#ef4444" stroke-width="1.5" rx="2"/>
      <circle cx="189" cy="44" r="2.5" fill="#ef4444"/>
      <text x="175" y="62" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="8">x, y</text>
      <text x="205" y="62" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="8">w, h</text>
    </g>

    <g transform="translate(610, 208)">
      <rect width="240" height="58" fill="#0d0f14" stroke="#2a2f45" rx="6"/>
      <text x="12" y="20" fill="#e2e8f0" font-family="Inter,Segoe UI,sans-serif" font-size="11" font-weight="600">2. Objectness score</text>
      <text x="12" y="38" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="10">confiança de haver um objeto na célula</text>
      <rect x="150" y="28" width="78" height="10" fill="#1a2332" rx="3"/>
      <rect x="150" y="28" width="52" height="10" fill="#ef4444" rx="3" opacity="0.85"/>
    </g>

    <g transform="translate(610, 278)">
      <rect width="240" height="72" fill="#0d0f14" stroke="#2a2f45" rx="6"/>
      <text x="12" y="20" fill="#e2e8f0" font-family="Inter,Segoe UI,sans-serif" font-size="11" font-weight="600">3. Probabilidades de classe</text>
      <text x="12" y="38" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="10">distribuição sobre as classes do dataset</text>
      <text x="12" y="56" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="9">classe A</text>
      <rect x="58" y="49" width="70" height="8" fill="#ef4444" rx="2" opacity="0.9"/>
      <text x="12" y="68" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="9">classe B</text>
      <rect x="58" y="61" width="42" height="8" fill="#ef4444" rx="2" opacity="0.55"/>
    </g>
  </g>
</svg>
